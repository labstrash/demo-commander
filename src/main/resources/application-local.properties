# =============================================================================
# COMMANDER SCHEDULING CONFIGURATION - FAST LOCAL DEVELOPMENT
# =============================================================================
commander.scheduling.timezone=Europe/Stockholm

# --- Pattern A: Fast local development schedules ---
# All cron-based schedules run every minute for quick testing
# The window-minutes values still reflect the real production lookback durations

# DAILY: Runs every minute (instead of once per day)
# Uses calendar-day rule (previous day midnight to fire time)
commander.scheduling.schedules[0].frequency=DAILY
commander.scheduling.schedules[0].cron=0 0/5 * * * ?
commander.scheduling.schedules[0].report-types=CAMT053E,CAMT053S,CAMT054D

# EVERY_30_MIN: Runs every minute (30-minute lookback still applies)
commander.scheduling.schedules[1].frequency=EVERY_30_MIN
commander.scheduling.schedules[1].cron=0 0/30 * * * ?
commander.scheduling.schedules[1].window-minutes=30
commander.scheduling.schedules[1].report-types=CAMT052B,CAMT052BT

# EVERY_1_HOUR: Runs every minute (60-minute lookback still applies)
commander.scheduling.schedules[2].frequency=EVERY_1_HOUR
commander.scheduling.schedules[2].cron=0 0 1 * * ?
commander.scheduling.schedules[2].window-minutes=60
commander.scheduling.schedules[2].report-types=CAMT052B,CAMT052BT

# EVERY_2_HOURS: Runs every minute (120-minute lookback still applies)
commander.scheduling.schedules[3].frequency=EVERY_2_HOURS
commander.scheduling.schedules[3].cron=0 0 2 * * ?
commander.scheduling.schedules[3].window-minutes=120
commander.scheduling.schedules[3].report-types=CAMT052B,CAMT052BT

# EVERY_4_HOURS: Runs every minute (240-minute lookback still applies)
commander.scheduling.schedules[4].frequency=EVERY_4_HOURS
commander.scheduling.schedules[4].cron=0 0 4 * * ?
commander.scheduling.schedules[4].window-minutes=240
commander.scheduling.schedules[4].report-types=CAMT052B,CAMT052BT

# --- Pattern B: Fast local development boundaries ---
# Boundaries set to current time + offsets for quick testing

# ONE_TIME_PER_DAY: Single boundary at 20:45
commander.scheduling.schedules[5].frequency=ONE_TIME_PER_DAY
commander.scheduling.schedules[5].boundaries=20:45
commander.scheduling.schedules[5].daysOfWeek=MON-SUN
commander.scheduling.schedules[5].report-types=CAMT054C

# FOUR_TIMES_PER_DAY: Four boundaries spaced 15 minutes apart
commander.scheduling.schedules[6].frequency=FOUR_TIMES_PER_DAY
commander.scheduling.schedules[6].boundaries=15:10,15:15,15:20,15:25
commander.scheduling.schedules[6].daysOfWeek=MON-SUN
commander.scheduling.schedules[6].report-types=CAMT054C

# EIGHT_TIMES_PER_DAY: Eight boundaries (actually 12 for faster testing)
# Boundaries every 5 minutes from 20:00 to 20:55
commander.scheduling.schedules[7].frequency=EIGHT_TIMES_PER_DAY
commander.scheduling.schedules[7].boundaries=23:00,23:05,23:10,23:15,23:20,23:25,23:30,23:35,23:40,23:45,23:50,23:55
commander.scheduling.schedules[7].daysOfWeek=MON-SUN
commander.scheduling.schedules[7].report-types=CAMT054C

# --- Logging Configurations ----
logging.level.com.example.commander=DEBUG

# =============================================================================
# COMMANDER MQ RESILIENCE - LOCAL DEVELOPMENT OVERRIDES
# Faster recovery polling and shorter backoffs, so a manual dead-letter test
# doesn't require waiting on production-sized (minutes-to-hours) timers.
# =============================================================================
commander.mq.resilience.recovery-job-cron=0/30 * * * * ?

# Same fast backoff for every tier, for local testing. Spring Boot binds indexed
# List properties from whichever property source defines that index at all - unlike
# Map, it does NOT merge individual fields for the same index across property
# sources - so each tier below is fully redeclared here (report-types included),
# the same way commander.scheduling.schedules[N] already is above, rather than
# assuming report-types would be inherited from application.properties.
commander.mq.resilience.dead-letter-retry-backoff-default.base-seconds=15
commander.mq.resilience.dead-letter-retry-backoff-default.max-seconds=120
commander.mq.resilience.dead-letter-retry-backoff-tiers[0].base-seconds=15
commander.mq.resilience.dead-letter-retry-backoff-tiers[0].max-seconds=120
commander.mq.resilience.dead-letter-retry-backoff-tiers[0].report-types=CAMT052B,CAMT052BT
commander.mq.resilience.dead-letter-retry-backoff-tiers[1].base-seconds=15
commander.mq.resilience.dead-letter-retry-backoff-tiers[1].max-seconds=120
commander.mq.resilience.dead-letter-retry-backoff-tiers[1].report-types=CAMT053E,CAMT053S,CAMT054D