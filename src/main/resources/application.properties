spring.application.name=demo-commander
spring.profiles.active=local

# =============================================================================
# DATABASE CONNECTIVITY
# =============================================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=REPORTDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=YourStrong!Passw0rd
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Connection pool sizing (HikariCP, Spring Boot default pool)
spring.datasource.hikari.pool-name=CommanderHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================================================
# QUARTZ CONFIGURATION
# JDBCJobStore against the QRTZ_* tables
# =============================================================================
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.quartz.overwrite-existing-jobs=true
spring.quartz.wait-for-jobs-to-complete-on-shutdown=true

# Quartz Scheduler Properties
spring.quartz.properties.org.quartz.scheduler.instanceName=CommanderScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO

# Scheduler is started explicitly by OrphanedTriggerCleanupRunner, after cleanup
# completes, so no trigger (orphaned or otherwise) can fire before the diff-and-clean
# step has run. See OrphanedTriggerCleanupRunner javadoc.
spring.quartz.auto-startup=false

# JobStore Configuration (Clustered)
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=15000
spring.quartz.properties.org.quartz.jobStore.tablePrefix=QRTZ_
spring.quartz.properties.org.quartz.jobStore.useProperties=true
spring.quartz.properties.org.quartz.jobStore.selectWithLockSQL=SELECT * FROM {0}LOCKS WITH (UPDLOCK, ROWLOCK) WHERE SCHED_NAME = {1} AND LOCK_NAME = ?
spring.quartz.properties.org.quartz.jobStore.misfireThreshold=60000

# Thread Pool Configuration
spring.quartz.properties.org.quartz.threadPool.threadCount=5
spring.quartz.properties.org.quartz.threadPool.threadPriority=5

# =============================================================================
# QUARTZ-DEDICATED DATABASE CONNECTION POOL
# Separate HikariCP pool used only by Quartz's JDBC job store (see
# QuartzDataSourceConfig), so clustered lock/check-in polling never contends
# with the app's own pool (spring.datasource.*) for connections. Sized small:
# just enough for the thread pool above (5) plus scheduler housekeeping.
# =============================================================================
commander.quartz.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=REPORTDB;encrypt=true;trustServerCertificate=true
commander.quartz.datasource.username=sa
commander.quartz.datasource.password=YourStrong!Passw0rd
commander.quartz.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

commander.quartz.datasource.hikari.pool-name=QuartzHikariPool
commander.quartz.datasource.hikari.maximum-pool-size=8
commander.quartz.datasource.hikari.minimum-idle=1
commander.quartz.datasource.hikari.connection-timeout=30000
commander.quartz.datasource.hikari.idle-timeout=600000
commander.quartz.datasource.hikari.max-lifetime=1800000

# =============================================================================
# SPRING BATCH CONFIGURATION
# JDBC-backed JobRepository against the BATCH_* tables - schema is owned by this
# project's own migration scripts (96-drop-batch.sql / 97-schema-batch.sql), not
# Spring Boot's auto-init, matching the same convention already used for Quartz above.
# =============================================================================
spring.batch.jdbc.initialize-schema=never

# The report pipeline Job is only ever launched explicitly, from
# ReportSchedulingJob via JobOperator.start() - it must not be auto-run on
# every application startup by Spring Boot's JobLauncherApplicationRunner.
spring.batch.job.enabled=false

# Chunk size (message count, not tree/page count). Independent tuning knob from
# commander.read.page-size: page size bounds read-side query round-trips,
# commit-interval bounds write-side transaction blast radius.
commander.batch.commit-interval=200

# =============================================================================
# IBM MQ CONNECTIVITY
# Matches infra/docker/compose.yaml's ibmmq service: queue manager QM1, app
# user with MQ_APP_PASSWORD, ports 1414 (MQ)/9443 (web console). config.mqsc
# doesn't define a channel explicitly, so this relies on the ibmcom/mq image's
# default DEV.APP.SVRCONN.
# =============================================================================
ibm.mq.queueManager=QM1
ibm.mq.channel=DEV.APP.SVRCONN
ibm.mq.connName=localhost(1414)
ibm.mq.user=app
ibm.mq.password=passw0rd

# =============================================================================
# COMMANDER MQ DELIVERY CONFIGURATION
# =============================================================================

# reportType -> target queue name, matching infra/docker/init-scripts/config.mqsc.
# Validated eagerly at startup against every report type the scheduler can fire.
commander.mq.queues.CAMT052B=CAMT.052B.QUEUE
commander.mq.queues.CAMT052BT=CAMT.052BT.QUEUE
commander.mq.queues.CAMT053S=CAMT.053S.QUEUE
commander.mq.queues.CAMT053E=CAMT.053E.QUEUE
commander.mq.queues.CAMT054C=CAMT.054C.QUEUE
commander.mq.queues.CAMT054D=CAMT.054D.QUEUE

# =============================================================================
# COMMANDER SCHEDULING CONFIGURATION
# =============================================================================
commander.scheduling.timezone=Europe/Stockholm

# --- Pattern A: Single cron per schedule (Production schedules) ---

# DAILY: Runs once per day on Tuesday-Saturday at 6:00 AM
# Uses calendar-day rule (previous day midnight to fire time)
commander.scheduling.schedules[0].frequency=DAILY
commander.scheduling.schedules[0].cron=0 0 6 ? * TUE-SAT
commander.scheduling.schedules[0].report-types=CAMT053E,CAMT053S,CAMT054D

# EVERY_30_MIN: Runs every 30 minutes during business hours, Monday-Friday
# Window-minutes=30 (30-minute rolling lookback)
commander.scheduling.schedules[1].frequency=EVERY_30_MIN
commander.scheduling.schedules[1].cron=0 0/30 0-21 ? * MON-FRI
commander.scheduling.schedules[1].window-minutes=30
commander.scheduling.schedules[1].report-types=CAMT052B,CAMT052BT

# EVERY_1_HOUR: Runs every hour during business hours, Monday-Friday
# Window-minutes=60 (60-minute rolling lookback)
commander.scheduling.schedules[2].frequency=EVERY_1_HOUR
commander.scheduling.schedules[2].cron=0 0 1-21 ? * MON-FRI
commander.scheduling.schedules[2].window-minutes=60
commander.scheduling.schedules[2].report-types=CAMT052B,CAMT052BT

# EVERY_2_HOURS: Runs every 2 hours during business hours, Monday-Friday
# Window-minutes=120 (120-minute rolling lookback)
commander.scheduling.schedules[3].frequency=EVERY_2_HOURS
commander.scheduling.schedules[3].cron=0 0 0/2 ? * MON-FRI
commander.scheduling.schedules[3].window-minutes=120
commander.scheduling.schedules[3].report-types=CAMT052B,CAMT052BT

# EVERY_4_HOURS: Runs every 4 hours during business hours, Monday-Friday
# Window-minutes=240 (240-minute rolling lookback)
commander.scheduling.schedules[4].frequency=EVERY_4_HOURS
commander.scheduling.schedules[4].cron=0 0 0/4 ? * MON-FRI
commander.scheduling.schedules[4].window-minutes=240
commander.scheduling.schedules[4].report-types=CAMT052B,CAMT052BT

# --- Pattern B: Ordered boundary list per schedule ---

# ONE_TIME_PER_DAY: Single daily boundary at 21:00
# One trigger fires at 21:00 each day
commander.scheduling.schedules[5].frequency=ONE_TIME_PER_DAY
commander.scheduling.schedules[5].boundaries=21:00
commander.scheduling.schedules[5].report-types=CAMT054C

# FOUR_TIMES_PER_DAY: Four boundaries per day
# Triggers fire at 10:00, 13:00, 18:00, 21:00
commander.scheduling.schedules[6].frequency=FOUR_TIMES_PER_DAY
commander.scheduling.schedules[6].boundaries=10:00,13:00,18:00,21:00
commander.scheduling.schedules[6].report-types=CAMT054C

# EIGHT_TIMES_PER_DAY: Eight boundaries per day
# Triggers fire at 03:00, 06:00, 08:00, 10:00, 12:00, 15:00, 18:00, 21:00
commander.scheduling.schedules[7].frequency=EIGHT_TIMES_PER_DAY
commander.scheduling.schedules[7].boundaries=03:00,06:00,08:00,10:00,12:00,15:00,18:00,21:00
commander.scheduling.schedules[7].report-types=CAMT054C
